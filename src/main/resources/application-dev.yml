spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:beauty_salon;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: ${LOCAL_DB_USER}
    password: ${LOCAL_DB_PASSWORD}

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

server:
  port: 8080
